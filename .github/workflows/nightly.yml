name: "Nightly Build"

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *' # Optional: Runs every night at midnight UTC

jobs:
  nightly-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set current date
        id: date
        # We store the date in the GITHUB_OUTPUT buffer
        run: echo "now=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cascadia Code Font
        run: |
          mkdir -p install
          pushd ./install

          wget -q https://github.com/microsoft/cascadia-code/releases/download/v2407.24/CascadiaCode-2407.24.zip
          unzip CascadiaCode-2407.24.zip
          sudo mv ./ttf/*.ttf /usr/share/fonts/
          sudo mv ./ttf/static/*.ttf /usr/share/fonts/
          fc-cache -fv

          popd

      - name: Install LXGW WenKai Font
        run: |
          mkdir -p install
          pushd ./install

          wget -q https://github.com/lxgw/LxgwWenKai/releases/download/v1.522/lxgw-wenkai-v1.522.zip
          unzip lxgw-wenkai-v1.522.zip
          sudo mv lxgw-wenkai-v1.522/*.ttf /usr/share/fonts
          fc-cache -fv

          popd

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with: 
          version: 10

      - name: Install Dependencies in .pipeline
        run: |
          pushd ./.pipeline/smiles
          pnpm install
          popd

      - name: Build Handbooks
        # This runs your custom Nix command which populates ./build
        run: nix run .#handbook

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build (Latest)"
          body: |
            ### Notes of AshGrey Nightly Build
            Release created at ${{ steps.date.outputs.now }}
            Release commit at ${{ github.sha }}

          prerelease: false
          # This grabs every PDF in your build folder
          files: build/*.pdf 
          # Overwrites the existing 'nightly' tag assets
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}